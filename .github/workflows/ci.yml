name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    name: vet + test -race
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "::error::gofmt found unformatted files:"
            gofmt -l .
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test -race
        run: go test -race -count=1 ./...

  vulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
      - name: run govulncheck
        run: govulncheck ./...

  gosec:
    name: gosec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: run gosec
        # RA-F-002: pin to specific version instead of @master (mutable branch).
        run: go run github.com/securego/gosec/v2/cmd/gosec@v2.22.5 -quiet -severity medium -confidence medium ./...
