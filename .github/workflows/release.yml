name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build and push
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/fyaz05/thundergo:${{ github.ref_name }}
            ghcr.io/fyaz05/thundergo:latest
          provenance: true
          sbom: true
      - uses: sigstore/cosign-installer@v3
      - name: sign image
        run: cosign sign --yes ghcr.io/fyaz05/thundergo@${{ steps.push.outputs.digest }}
